<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Usuarios — IPS Fulano</title><link rel="stylesheet" href="/css/app.css"></head>
<body>
<script src="/js/api.js"></script><script src="/js/layout.js"></script>
<script>
if (!requireAuth()) throw '';
const u = API.usuario();
if (u.rol !== 'admin') { window.location.href='/dashboard.html'; throw ''; }
renderLayout('Usuarios');

let usuarios=[], roles=[];

async function init() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="abrirModal()">+ Nuevo usuario</button>`;
  [usuarios, roles] = await Promise.all([API.usuarios.listar(), API.usuarios.roles()]);
  render();
}

function render() {
  document.getElementById('page-content').innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">Usuarios (${usuarios.length})</span></div>
      <div class="table-container"><table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Último acceso</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>${usuarios.map(u=>`
          <tr>
            <td style="font-weight:600;">${u.nombre}</td>
            <td class="text-muted">${u.email}</td>
            <td><span class="badge badge-info">${u.rol_nombre}</span></td>
            <td class="text-muted">${u.ultimo_acceso ? fmt(u.ultimo_acceso) : '—'}</td>
            <td>
              ${u.bloqueado_hasta && new Date()<new Date(u.bloqueado_hasta)
                ? `<span class="badge badge-danger">Bloqueado</span>`
                : u.activo ? `<span class="badge badge-success">Activo</span>` : `<span class="badge badge-gray">Inactivo</span>`}
            </td>
            <td><div style="display:flex;gap:4px;flex-wrap:wrap;">
              <button class="btn btn-secondary btn-sm" onclick="editar(${u.id})">✏️</button>
              <button class="btn btn-secondary btn-sm" onclick="toggleActivo(${u.id})" title="${u.activo?'Desactivar':'Activar'}">${u.activo?'🔴':'🟢'}</button>
              <button class="btn btn-secondary btn-sm" onclick="resetPass(${u.id})" title="Resetear contraseña">🔑</button>
              ${u.bloqueado_hasta ? `<button class="btn btn-secondary btn-sm" onclick="desbloquear(${u.id})">🔓</button>` : ''}
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
    <div id="modal-overlay" class="modal-overlay">
      <div class="modal"><div class="modal-header"><span class="modal-title" id="modal-title">Nuevo usuario</span>
      <button class="modal-close" onclick="cerrarModal()">×</button></div>
      <div class="modal-body" id="modal-body"></div></div>
    </div>`;
}

let editId=null;
function abrirModal(u=null) {
  editId=u?.id||null;
  document.getElementById('modal-title').textContent = u ? 'Editar usuario' : 'Nuevo usuario';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label class="form-label">Nombre completo *</label>
      <input id="f-nombre" class="form-control" value="${u?.nombre||''}"></div>
    <div class="form-group"><label class="form-label">Email *</label>
      <input id="f-email" class="form-control" type="email" value="${u?.email||''}"></div>
    <div class="form-group"><label class="form-label">Rol *</label>
      <select id="f-rol" class="form-control">
        ${roles.map(r=>`<option value="${r.id}" ${u?.rol_id==r.id?'selected':''}>${r.nombre}</option>`).join('')}
      </select></div>
    <div class="modal-footer" style="padding:16px 0 0;border-top:1px solid var(--borde);">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button id="btn-g" class="btn btn-primary" onclick="guardar()">💾 Guardar</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
async function editar(id) {
  const u = usuarios.find(u=>u.id===id);
  if (u) abrirModal(u);
}
function cerrarModal() { document.getElementById('modal-overlay').classList.remove('show'); editId=null; }

async function guardar() {
  const body = { nombre: document.getElementById('f-nombre').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    rol_id: document.getElementById('f-rol').value };
  if (!body.nombre||!body.email) { toast('Nombre y email son requeridos','warning'); return; }
  const btn=document.getElementById('btn-g');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    if (editId) { await API.usuarios.editar(editId, body); toast('Usuario actualizado','success'); }
    else { await API.usuarios.crear(body); toast('Usuario creado. Contraseña enviada por correo.','success'); }
    cerrarModal(); usuarios=await API.usuarios.listar(); render();
  } catch(e) { toast(e.message,'error'); } finally { btn.disabled=false; btn.textContent='💾 Guardar'; }
}
async function toggleActivo(id) {
  try { await API.usuarios.toggleActivo(id); usuarios=await API.usuarios.listar(); render(); }
  catch(e) { toast(e.message,'error'); }
}
async function resetPass(id) {
  if (!confirm('¿Resetear la contraseña? Se enviará una nueva al correo del usuario.')) return;
  try { await API.usuarios.resetearPassword(id); toast('Contraseña reseteada y enviada por correo','success'); }
  catch(e) { toast(e.message,'error'); }
}
async function desbloquear(id) {
  try { await API.usuarios.desbloquear(id); toast('Usuario desbloqueado','success'); usuarios=await API.usuarios.listar(); render(); }
  catch(e) { toast(e.message,'error'); }
}
init();
</script></body></html>
