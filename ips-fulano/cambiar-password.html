<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cambiar contraseña — IPS Fulano</title><link rel="stylesheet" href="/css/app.css"></head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/img/logo.png" alt="IPS Fulano" onerror="this.style.display='none'">
      <h1>IPS FULANO</h1>
      <p>Cambia tu contraseña para continuar</p>
    </div>
    <div id="alert" style="display:none"></div>
    <div class="form-group"><label class="form-label">Contraseña actual</label>
      <input id="pass-actual" type="password" class="form-control" placeholder="••••••••"></div>
    <div class="form-group"><label class="form-label">Nueva contraseña</label>
      <input id="pass-nueva" type="password" class="form-control" placeholder="Mínimo 8 caracteres"></div>
    <div class="form-group"><label class="form-label">Confirmar nueva contraseña</label>
      <input id="pass-confirm" type="password" class="form-control" placeholder="Repite la nueva contraseña"></div>
    <button id="btn" class="btn btn-primary w-full mt-2" style="justify-content:center;padding:12px;" onclick="cambiar()">🔑 Cambiar contraseña</button>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
if (!API.isAuth()) { window.location.href='/index.html'; throw ''; }
async function cambiar() {
  const pa=document.getElementById('pass-actual').value;
  const pn=document.getElementById('pass-nueva').value;
  const pc=document.getElementById('pass-confirm').value;
  const alertEl=document.getElementById('alert');
  alertEl.style.display='none';
  if (pn !== pc) { alertEl.className='alert alert-danger'; alertEl.textContent='Las contraseñas no coinciden'; alertEl.style.display='block'; return; }
  if (pn.length < 8) { alertEl.className='alert alert-warning'; alertEl.textContent='La contraseña debe tener al menos 8 caracteres'; alertEl.style.display='block'; return; }
  const btn=document.getElementById('btn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  try {
    await API.auth.cambiarPassword({ password_actual: pa, password_nueva: pn });
    const u = API.usuario(); u.password_cambiada=true; localStorage.setItem('ips_usuario',JSON.stringify(u));
    window.location.href='/dashboard.html';
  } catch(e) { alertEl.className='alert alert-danger'; alertEl.textContent=e.message; alertEl.style.display='block'; }
  finally { btn.disabled=false; btn.textContent='🔑 Cambiar contraseña'; }
}
</script>
</body></html>
